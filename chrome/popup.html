<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>📄 preview.md - Markdown Viewer</title>
    <script src="tailwind.js"></script>
    <style>
      body {
        width: 320px;
      }
      .file-chooser input[type="file"] {
        display: none;
      }
      .file-input-label {
        cursor: pointer;
      }
    </style>
  </head>
  <body
    class="shadow-sm rounded-lg border font-sans bg-stone-800 border-stone-900/50"
  >
    <div class="m-2">
      <div
        class="flex items-center justify-between p-1 border-b border-stone-300"
      >
        <h3 class="font-mono text-sm font-bold tracking-wide text-stone-400">
          📄 preview.md
        </h3>
        <span class="text-[10px] font-mono text-stone-400">v1.0</span>
      </div>
      <label class="font-mono block text-xs font-light text-stone-400 mt-2">
        Preview markdown file instantly.<br /><u>100% In-Browser.</u> Your file
        never leaves your computer 🔏
      </label>
    </div>
    <div id="file-chooser" class="file-chooser pt-2 pb-4">
      <label
        for="file-chooser"
        id="file-input-label"
        class="font-mono file-input-label text-text-sm text-stone-800 bg-stone-400 border-stone-100 font-medium border-solid hover p-1 m-2"
        >&nbsp;&nbsp;View Now&nbsp;&nbsp;</label
      >
      <input type="file" id="file-input" accept=".md" />
    </div>
  </body>
  <script src="popup.js"></script>
</html>
