<!doctype html>
<html lang="en">
  <head>
    <meta
      name="description"
      content="preview.md - lightweight mardkdown viewer extension"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>"
    />
    <title>📄 preview.md</title>
    <script src="tailwind.js"></script>
    <script src="marked.min.js"></script>
    <script src="viewer.js" type="module"></script>
    <style>
      /* style/variable.css */
      :root {
        --color-bg: #faf9f6;
        --color-text: #2d2d2a;
        --color-bg-muted: #f1f0ea;
        --color-text-muted: #6e6e66;
        --color-bg-block: #fff;
        --color-text-block: #2d2d2a;
        --color-bg-block-muted: #f5f4ef;
        --color-text-block-muted: #8b8a82;
        --color-bg-vivid: #fef9e7;
        --color-text-vivid: #b28a00;
        --color-bg-code: #f3f2eb;
        --color-text-code: #547f00;
        --color-accent: #d33f6a;
        --color-border: #e2dfd5;
      }

      html.dark {
        --color-bg: #272822;
        --color-text: #f8f8f2;
        --color-bg-muted: #3e3d32;
        --color-text-muted: #8f908a;
        --color-bg-block: #1e1f1c;
        --color-text-block: #f8f8f2;
        --color-bg-block-muted: #2d2e2b;
        --color-text-block-muted: #75715e;
        --color-bg-vivid: #e6db7422;
        --color-text-vivid: #e6db74;
        --color-bg-code: #23241f;
        --color-text-code: #a6e22e;
        --color-accent: #f92672;
        --color-border: #49483e;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-size: revert !important;
        line-height: normal !important;
        line-break: loose;
      }

      .preview-content {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Roboto,
          Noto Sans,
          Ubuntu,
          Cantarell,
          Helvetica Neue,
          sans-serif;
      }

      .dyslexic-mode .w-full {
        justify-items: center !important;
      }

      .dyslexic-mode .preview-content,
      .dyslexic-mode .preview-content * {
        max-width: 600px;
      }

      .preview-content h1,
      .preview-content h2,
      .preview-content h3,
      .preview-content h4,
      .preview-content h5 {
        position: relative;
      }

      .preview-content h1 {
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 1rem;
        padding-bottom: 0.25rem;
        font-weight: 700;
      }

      .preview-content h2 {
        border-bottom: 1px solid var(--color-border);
        margin-bottom: 0.75rem;
        padding-bottom: 0.25rem;
        font-weight: 600;
      }

      .preview-content h3 {
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .preview-content h4 {
        margin-bottom: 0.5rem;
        font-weight: 500;
      }

      .preview-content h5 {
        color: var(--color-text-muted);
        margin-bottom: 0.5rem;
        font-weight: 600;
      }

      .preview-content p {
        margin-bottom: 1rem;
        line-height: 1.625;
      }

      .preview-content ul {
        list-style-type: disc;
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }

      .preview-content ol {
        list-style-type: decimal;
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }

      .preview-content li {
        margin-bottom: 0.25rem;
      }

      .preview-content code {
        background-color: var(--color-bg-code);
        color: var(--color-text-code);
        border-radius: 0.25rem;
        padding: 0.125rem 0.25rem;
        font-family:
          Source Code Pro,
          monospace;
      }

      .preview-content pre {
        background-color: var(--color-bg-block);
        color: var(--color-text-block);
        overflow-x: auto;
        border: 1px solid var(--color-border);
        border-radius: 0.375rem;
        margin-bottom: 1rem;
        padding: 1rem;
      }

      .preview-content pre code {
        color: inherit;
        background-color: #0000;
        padding: 0;
      }

      .preview-content blockquote {
        border-left: 4px solid var(--color-bg-block-muted);
        color: var(--color-text-block-muted);
        margin: 1rem 0;
        padding-left: 1rem;
        font-style: italic;
      }

      .preview-content a {
        color: var(--color-accent);
        text-decoration: underline;
      }

      .preview-content table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 1rem;
      }

      .preview-content th,
      .preview-content td {
        border: 1px solid var(--color-bg-muted);
        padding: 0.5rem 0.75rem;
      }

      .preview-content th {
        background-color: var(--color-bg);
        text-align: left;
        font-weight: 600;
      }

      .preview-content mark {
        background-color: var(--color-bg-vivid);
        color: var(--color-text-vivid);
        border-radius: 0.125rem;
        padding: 0 0.25rem;
      }

      /* style/index.css */
      #preview {
        content-visibility: auto;
        contain-intrinsic-size: 100px 500px;
      }

      .preview-content img {
        display: block;
        background-color: #f3f4f6;
        border-radius: 0.375rem;
        max-width: 100%;
        height: auto;
      }

      @media (prefers-color-scheme: dark) .preview-content img {
        background-color: #1f2937;
      }

      .preview-content img:not([width]):not([height]) {
        aspect-ratio: auto;
        object-fit: cover;
      }

      .preview-content img:complete {
        aspect-ratio: auto;
        object-fit: contain;
      }
    </style>
  </head>
  <body
    class="h-screen flex flex-col bg-stone-50 dark:bg-stone-900 text-gray-900 dark:text-gray-100 overflow-hidden"
  >
    <nav
      class="h-14 bg-stone-600 text-white flex items-center justify-between px-4 z-40 shrink-0 shadow-md"
    >
      <div class="text-lg font-bold tracking-wide">📄 preview.md</div>

      <div class="flex items-center space-x-2">
        <button
          id="zoom-in-btn"
          class="px-3 py-1.5 text-xs font-bold bg-stone-700 hover:bg-stone-800 rounded transition text-white"
        >
          Zoom In
        </button>
        <button
          id="zoom-out-btn"
          class="px-3 py-1.5 text-xs font-bold bg-stone-700 hover:bg-stone-800 rounded transition text-white"
        >
          Zoom Out
        </button>

        <button
          id="theme-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-stone-700 hover:bg-stone-800 rounded transition text-white"
        >
          ☀️
        </button>
        <button
          id="dyslexic-btn"
          class="px-3 py-1.5 text-xs font-semibold bg-orange-800 hover:bg-orange-900 text-white rounded transition"
        >
          Easy Read OFF
        </button>
      </div>
    </nav>

    <main class="flex flex-1 h-[calc(100vh-3.5rem)] overflow-hidden relative">
      <div
        id="preview-container"
        class="w-full h-full overflow-y-auto p-6 bg-white dark:bg-stone-900 relative transition-all duration-300"
      >
        <div id="preview" class="preview-content max-w-none"></div>
      </div>
    </main>
  </body>
</html>
